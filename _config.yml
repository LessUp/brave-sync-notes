title: Note Sync Now
description: >-
  端到端加密笔记同步工具：12 词助记词恢复、实时协作与多设备同步
remote_theme: pages-themes/cayman@v0.2.0
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
repository: LessUp/brave-sync-notes
show_downloads: false

# SEO & metadata
url: https://lessup.github.io
baseurl: /brave-sync-notes
lang: zh-CN
author: LessUp

# Markdown rendering
markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false
  syntax_highlighter: rouge

# Default layout for all pages
defaults:
  - scope:
      path: ""
    values:
      layout: default
  - scope:
      path: "changelog"
    values:
      layout: default

# Exclude irrelevant files from Jekyll build
exclude:
  - .git
  - .github
  - .kiro
  - .vscode
  - brave-sync-notes
  - node_modules
  - package-lock.json
  - IMPLEMENTATION_PROGRESS.md
  - TEST_RESULTS.md
  - .editorconfig
  - .gitignore
  - Gemfile
  - Gemfile.lock
  - vendor
