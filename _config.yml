title: Note Sync Now
description: E2E encrypted note sync — AES-256, 12-word mnemonic, real-time collaboration
url: https://lessup.github.io
baseurl: /sync-notes
lang: en

remote_theme: pages-themes/cayman@v0.2.0
plugins:
  - jekyll-remote-theme

exclude:
  - brave-sync-notes/
  - node_modules/
  - package-lock.json
  - IMPLEMENTATION_PROGRESS.md
  - TEST_RESULTS.md
  - CONTRIBUTING.md
  - .editorconfig
  - .gitignore
  - .github/
  - .kiro/
  - .vscode/
