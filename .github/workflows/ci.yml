name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  client:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./brave-sync-notes/client

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./brave-sync-notes/client/package-lock.json

      - name: Install client dependencies
        run: npm install

      - name: Run client tests
        run: npm test -- --run

      - name: Build client
        run: npm run build

  server:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./brave-sync-notes/server

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./brave-sync-notes/server/package-lock.json

      - name: Install server dependencies
        run: npm install

      - name: Run server tests
        run: npm test
