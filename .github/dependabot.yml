version: 2
updates:
- package-ecosystem: npm
  directory: /apps/web
  schedule:
    interval: weekly
    day: monday
    time: 09:00
  open-pull-requests-limit: 0
  labels:
  - dependencies
  - web
  commit-message:
    prefix: chore(deps)
    include: scope
- package-ecosystem: npm
  directory: /apps/api
  schedule:
    interval: weekly
    day: monday
    time: 09:00
  open-pull-requests-limit: 0
  labels:
  - dependencies
  - api
  commit-message:
    prefix: chore(deps)
    include: scope
- package-ecosystem: npm
  directory: /docs
  schedule:
    interval: monthly
  open-pull-requests-limit: 0
  labels:
  - dependencies
  - documentation
  commit-message:
    prefix: chore(deps)
    include: scope
- package-ecosystem: github-actions
  directory: /
  schedule:
    interval: weekly
    day: monday
    time: 09:00
  labels:
  - dependencies
  - ci
  commit-message:
    prefix: chore(deps)
    include: scope
  open-pull-requests-limit: 0
